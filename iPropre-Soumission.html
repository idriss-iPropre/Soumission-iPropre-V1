<style>
  :root {
    --ip-orange: #F4A51C;
    --ip-orange-soft: #FBE5B2;
    --ip-blue: #8C9BD4;
    --ip-blue-soft: #DFE4F4;
    --ip-coral: #F5A880;
    --ip-coral-soft: #FBDECB;
    --ip-ink: #0F0F10;
    --ip-ink-2: #3A3A3F;
    --ip-muted: #7B7B82;
    --ip-line: #E6E4DF;
    --ip-line-2: #F0EEEA;
    --ip-bg: #FAF8F3;
    --ip-bg-card: #FFFFFF;
    --ip-green: #5A8A5B;
    --ip-red: #C14545;
    --font-serif: 'Playfair Display', 'Times New Roman', serif;
    --font-sans: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ip-bg); color: var(--ip-ink); font-family: var(--font-sans); font-size: 15px; line-height: 1.5; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: inherit; }

  /* ---------- Top bar ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 40;
    background: rgba(250, 248, 243, 0.92);
    backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--ip-line);
  }
  .topbar-inner {
    max-width: 1320px; margin: 0 auto;
    display: flex; align-items: center; gap: 32px;
    padding: 14px 32px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand img { height: 38px; width: auto; display: block; }
  .brand .name { font-family: var(--font-serif); font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .brand .name em { font-style: normal; color: var(--ip-orange); }
  .brand .tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ip-muted); }

  .nav-tabs { display: flex; gap: 4px; margin-left: auto; }
  .nav-tabs button {
    padding: 9px 16px; border-radius: 999px; font-size: 13.5px; font-weight: 500;
    color: var(--ip-ink-2); transition: all 0.15s ease;
  }
  .nav-tabs button:hover { background: var(--ip-line-2); }
  .nav-tabs button.active { background: var(--ip-ink); color: #fff; font-weight: 600; }
  .nav-tabs button .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--ip-orange); margin-right: 8px; vertical-align: middle; }

  .client-badge {
    display: flex; align-items: center; gap: 10px; padding: 6px 10px 6px 6px;
    border: 1px solid var(--ip-line); border-radius: 999px; background: #fff;
    font-size: 13px;
  }
  .client-badge .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--ip-orange); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: 12px; }
  .client-badge .meta .n { font-weight: 600; font-size: 12.5px; }
  .client-badge .meta .d { font-size: 11px; color: var(--ip-muted); }

  /* ---------- Layout ---------- */
  main { max-width: 1320px; margin: 0 auto; padding: 32px; }

  .page-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; gap: 32px; }
  .page-head h1 { font-family: var(--font-serif); font-size: 42px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 6px; }
  .page-head .sub { color: var(--ip-muted); font-size: 14px; max-width: 520px; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ip-orange); margin-bottom: 12px; display: block; }

  /* ---------- Cards & panels ---------- */
  .card { background: var(--ip-bg-card); border: 1px solid var(--ip-line); border-radius: 18px; }
  .card-pad { padding: 24px; }

  /* ---------- Buttons ---------- */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 10px; font-size: 13.5px; font-weight: 500; transition: all 0.15s ease; border: 1px solid transparent; }
  .btn-primary { background: var(--ip-ink); color: #fff; }
  .btn-primary:hover { background: #2a2a30; }
  .btn-ghost { border-color: var(--ip-line); background: #fff; }
  .btn-ghost:hover { border-color: var(--ip-ink); }
  .btn-orange { background: var(--ip-orange); color: #fff; }
  .btn-orange:hover { background: #d99115; }
  .btn-icon { width: 28px; height: 28px; padding: 0; border-radius: 8px; display: inline-grid; place-items: center; border: 1px solid var(--ip-line); background: #fff; }
  .btn-icon:hover { border-color: var(--ip-ink); }
  .btn-icon.danger:hover { border-color: var(--ip-red); color: var(--ip-red); }

  /* ---------- Hide/show pages ---------- */
  .page { display: none; animation: fadeUp 0.35s ease both; }
  .page.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ---------- Footer action bar ---------- */
  .actionbar {
    position: sticky; bottom: 16px; z-index: 30;
    margin: 28px auto 0; padding: 14px 18px;
    display: flex; align-items: center; gap: 14px;
    background: var(--ip-ink); color: #fff; border-radius: 14px;
    box-shadow: 0 12px 40px rgba(15,15,16,0.18);
  }
  .actionbar .total-box { display: flex; align-items: baseline; gap: 10px; padding-right: 14px; border-right: 1px solid rgba(255,255,255,0.14); }
  .actionbar .total-box .k { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.14em; color: #a9a9b0; }
  .actionbar .total-box .v { font-family: var(--font-serif); font-size: 22px; font-weight: 700; }
  .actionbar .spacer { flex: 1; }
  .actionbar .btn-orange { background: var(--ip-orange); color: #1a1208; font-weight: 600; }
  .actionbar .btn-orange:hover { background: #ffb532; }
  .actionbar .btn-light { background: rgba(255,255,255,0.08); color: #fff; }
  .actionbar .btn-light:hover { background: rgba(255,255,255,0.14); }

  /* ---------- Misc ---------- */
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--ip-line-2); font-size: 11.5px; font-weight: 500; color: var(--ip-ink-2); }
  .pill.orange { background: var(--ip-orange-soft); color: #7c5300; }
  .pill.blue { background: var(--ip-blue-soft); color: #2f3e7e; }
  .pill.coral { background: var(--ip-coral-soft); color: #8a3d0b; }

  /* ---------- Toast ---------- */
  .toast-stack { position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
  .toast { background: var(--ip-ink); color: #fff; padding: 12px 16px; border-radius: 12px; font-size: 13.5px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: slideIn 0.25s ease both; }
  .toast .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ip-orange); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  /* ---------- Modal ---------- */
  .modal-bg { position: fixed; inset: 0; background: rgba(15,15,16,0.55); backdrop-filter: blur(4px); z-index: 80; display: grid; place-items: center; animation: fadeIn 0.2s ease; padding: 20px; }
  .modal { background: #fff; border-radius: 20px; max-width: 680px; width: 100%; max-height: 88vh; overflow: auto; animation: popIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

  .stable tbody td { padding: 12px 14px; border-bottom: 1px solid var(--ip-line-2); vertical-align: middle; }

  .sel.col-initial { background-color: #fafafa; }

  .sel.col-vip { background-color: rgba(245,168,128,0.08); }

  .txt-input { width: 100%; padding: 9px 12px; border-radius: 9px; background: #fff; border: 1px solid var(--ip-line); font-size: 13px; transition: border 0.12s; }
  .txt-input:focus { outline: none; border-color: var(--ip-ink); }

  .plan-head { position: relative; padding: 18px 14px !important; text-align: center !important; }
  .plan-head .lbl { font-family: var(--font-serif); font-size: 17px; font-weight: 700; text-transform: none; letter-spacing: 0; color: var(--ip-ink); }
  .plan-head .sub { font-size: 10.5px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.16em; margin-top: 2px; }
  .plan-head.initial { background: #F4F2ED; }
  .plan-head.offre { background: linear-gradient(180deg, #DFE4F4 0%, #C9D1EC 100%); }
  .plan-head.vip { background: linear-gradient(180deg, #FBDECB 0%, #F5B997 100%); }
  .plan-head .ribbon { display: inline-block; font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.15em; text-transform: uppercase; background: var(--ip-orange); color: #fff; padding: 3px 8px; border-radius: 999px; margin-top: 6px; }

  /* ---------- Responsive ---------- */
  @media (max-width: 900px) {
    .topbar-inner { flex-wrap: wrap; gap: 12px; padding: 12px 16px; }
    .nav-tabs { order: 3; width: 100%; overflow-x: auto; }
    main { padding: 20px 16px; }
    .page-head { flex-direction: column; align-items: flex-start; }
    .page-head h1 { font-size: 32px; }
  }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

// ---------- Toast system ----------
function useToasts() {
  const [items, setItems] = React.useState([]);
  const push = React.useCallback((msg) => {
    const id = Date.now() + Math.random();
    setItems(s => [...s, { id, msg }]);
    setTimeout(() => setItems(s => s.filter(t => t.id !== id)), 2600);
  }, []);
  const ui = (
    <div className="toast-stack">
      {items.map(t => (
        <div key={t.id} className="toast"><span className="dot" />{t.msg}</div>
      ))}
    </div>
  );
  return [push, ui];
}

// ---------- Logo header (tiny) ----------
function BrandMark({ size = 38 }) {
  return <img src="assets/logo.png" alt="iPropre" style={{ height: size, width: 'auto', display: 'block' }} />;
}

// ---------- Currency helpers ----------
const fmtMoney = (n) => {
  if (n == null || isNaN(n)) return '—';
  return n.toLocaleString('fr-CA', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
};

// ---------- Section heading with iPropre signature style ----------
function SectionTitle({ label, idx, color = 'var(--ip-orange)', onRename }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 14 }}>
      <div style={{
        width: 34, height: 34, borderRadius: 10,
        background: '#fff', border: '1px solid var(--ip-line)',
        display: 'grid', placeItems: 'center', flexShrink: 0
      }}>
        <BrandMark size={22} />
      </div>
      <h3 style={{
        margin: 0, fontFamily: 'var(--font-serif)', fontSize: 24, fontWeight: 700, color,
        letterSpacing: '-0.01em',
      }}>{label}</h3>
      {idx != null && <span className="pill" style={{ marginLeft: 4 }}>{String(idx).padStart(2,'0')}</span>}
    </div>
  );
}

// ---------- Shared select ----------
function SmartSelect({ value, onChange, options, extraClass = '' }) {
  const [customMode, setCustomMode] = React.useState(false);
  const [customDraft, setCustomDraft] = React.useState(value || '');
  const isCustom = value && !options.includes(value) && value !== '';

  React.useEffect(() => {
    if (isCustom) setCustomDraft(value);
  }, [value, isCustom]);

  if (customMode || isCustom) {
    return (
      <div style={{ display: 'flex', gap: 4 }}>
        <input
          className={`txt-input sel is-custom ${extraClass}`}
          value={customDraft}
          autoFocus={customMode}
          placeholder="Personnaliser…"
          onChange={(e) => setCustomDraft(e.target.value)}
          onBlur={() => { onChange(customDraft); setCustomMode(false); }}
          onKeyDown={(e) => {
            if (e.key === 'Enter') { onChange(customDraft); setCustomMode(false); e.target.blur(); }
            if (e.key === 'Escape') { setCustomMode(false); setCustomDraft(value||''); }
          }}
          style={{ flex: 1, background: 'var(--ip-blue-soft)' }}
        />
        <button className="btn-icon" title="Revenir aux options"
                onClick={() => { onChange(''); setCustomMode(false); }}>
          <Icon.close />
        </button>
      </div>
    );
  }

  return (
    <select
      className={`sel ${extraClass}`}
      value={value || ''}
      onChange={(e) => {
        if (e.target.value === '__custom__') { setCustomMode(true); setCustomDraft(''); }
        else onChange(e.target.value);
      }}
    >
      <option value="">—</option>
      {options.map(o => <option key={o} value={o}>{o}</option>)}
      <option value="__custom__">✏️ Personnaliser…</option>
    </select>
  );
}

// Expose globally for other Babel scripts
Object.assign(window, { Icon, useToasts, BrandMark, fmtMoney, SectionTitle, SmartSelect });

</script>

    options: FREQ_OPTIONS,

      { label: 'Polissage du plancher', v: ['Fréquence', 'Fréquence', 'Fréquence'] },

const PLAN_DEFS = [
  { key: 0, label: 'Devis initial', sub: 'Votre base', headCls: 'initial', colCls: 'col-initial' },
  { key: 1, label: 'Offre iPropre', sub: 'Recommandé',  headCls: 'offre',   colCls: 'col-offre', ribbon: 'Recommandé' },
  { key: 2, label: 'VIP Tout inclus', sub: 'Premium',    headCls: 'vip',     colCls: 'col-vip' },
];

function SoumissionPage({ state, setState, pushToast, history, undo, future, redo }) {
  const { sections, prices, selectedPlan } = state;
  const [collapsed, setCollapsed] = React.useState({});

  const toggleCollapse = (id) => setCollapsed(c => ({ ...c, [id]: !c[id] }));
  const allOpen = sections.every(s => !collapsed[s.id]);
  const toggleAll = () => {
    if (allOpen) {
      const next = {}; sections.forEach(s => next[s.id] = true);
      setCollapsed(next);
    } else {
      setCollapsed({});
    }
  };

  const updateRowValue = (secIdx, rowIdx, planIdx, val) => {
    setState(s => {
      const secs = s.sections.map((sec, si) => {
        if (si !== secIdx) return sec;
        const rows = sec.rows.map((r, ri) => ri === rowIdx ? { ...r, v: r.v.map((x, pi) => pi === planIdx ? val : x) } : r);
        return { ...sec, rows };
      });
      return { ...s, sections: secs };
    });
  };

  const updateRowLabel = (secIdx, rowIdx, label) => {
    setState(s => {
      const secs = s.sections.map((sec, si) => {
        if (si !== secIdx) return sec;
        return { ...sec, rows: sec.rows.map((r, ri) => ri === rowIdx ? { ...r, label } : r) };
      });
      return { ...s, sections: secs };
    });
  };

  const addRow = (secIdx) => {
    setState(s => {
      const secs = s.sections.map((sec, si) => {
        if (si !== secIdx) return sec;
        return { ...sec, rows: [...sec.rows, { label: '', v: ['', '', ''], isNew: true }] };
      });
      return { ...s, sections: secs };
    });
    pushToast('Ligne ajoutée');
  };

  const removeRow = (secIdx, rowIdx) => {
    setState(s => {
      const secs = s.sections.map((sec, si) => {
        if (si !== secIdx) return sec;
        return { ...sec, rows: sec.rows.filter((_, ri) => ri !== rowIdx) };
      });
      return { ...s, sections: secs };
    });
    pushToast('Ligne supprimée');
  };

  const addSection = () => {
    setState(s => {
      const id = 'custom-' + Date.now();
      return {
        ...s,
        sections: [...s.sections, {
          id, title: 'Nouveau service', options: FREQ_OPTIONS,
          rows: [{ label: '', v: ['', '', ''], isNew: true }],
          isCustom: true,
        }]
      };
    });
    pushToast('Section ajoutée');
  };

  const removeSection = (secIdx) => {
    setState(s => ({ ...s, sections: s.sections.filter((_, i) => i !== secIdx) }));
    pushToast('Section supprimée');
  };

  const renameSection = (secIdx, title) => {
    setState(s => ({ ...s, sections: s.sections.map((sec, i) => i === secIdx ? { ...sec, title } : sec) }));
  };

  const setPrice = (planIdx, val) => {
    setState(s => ({ ...s, prices: s.prices.map((p, i) => i === planIdx ? val : p) }));
  };

  const setSelectedPlan = (idx) => {
    setState(s => ({ ...s, selectedPlan: idx }));
    pushToast(`Plan sélectionné : ${PLAN_DEFS[idx].label}`);
  };

  return (
    <div className="page active">
      <div className="page-head">
        <div>
          <span className="eyebrow">02 — Soumission</span>
          <h1>Devis interactif.</h1>
          <p className="sub">Ajoutez ou supprimez des lignes par service. Chaque case propose des options ou un champ libre « Personnaliser ».</p>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn btn-ghost" onClick={undo} disabled={!history || history.length === 0} style={{ opacity: (!history || history.length === 0) ? 0.4 : 1 }} title="Annuler la dernière action">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/></svg>
            Annuler {history && history.length > 0 ? `(${history.length})` : ''}
          </button>
          <button className="btn btn-ghost" onClick={() => { if (typeof redo === 'function') redo(); }} disabled={!future || future.length === 0} style={{ opacity: (!future || future.length === 0) ? 0.4 : 1 }} title="Rétablir / Avancé">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 15-6.7L21 13"/></svg>
            Avancé {future && future.length > 0 ? `(${future.length})` : ''}
          </button>
          <button className="btn btn-ghost" onClick={toggleAll}>
            {allOpen ? 'Tout replier' : 'Tout déplier'}
          </button>
          <button className="btn btn-ghost" onClick={addSection}>
            <Icon.plus /> Ajouter un service
          </button>
        </div>
      </div>

      {/* Plan header card */}
      <div className="card" style={{ marginBottom: 20, overflow: 'hidden' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'minmax(240px, 1.6fr) repeat(3, 1fr)' }}>
          <div style={{ padding: '22px 24px', borderRight: '1px solid var(--ip-line)' }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.14em', color: 'var(--ip-muted)', marginBottom: 6 }}>Nos tarifs</div>
            <div style={{ fontFamily: 'var(--font-serif)', fontSize: 24, fontWeight: 700 }}>Plans de service</div>
            <div style={{ fontSize: 13, color: 'var(--ip-muted)', marginTop: 6 }}>Comparez les 3 plans côte à côte, puis sélectionnez celui qui convient.</div>
          </div>
          {PLAN_DEFS.map((p, i) => (
            <button
              key={p.key}
              onClick={() => setSelectedPlan(i)}
              className={`plan-head ${p.headCls}`}
              style={{
                border: 'none', cursor: 'pointer',
                borderLeft: i > 0 ? '1px solid rgba(0,0,0,0.06)' : 'none',
                outline: selectedPlan === i ? '3px solid var(--ip-ink)' : 'none',
                outlineOffset: -3,
                transition: 'outline 0.15s',
              }}
            >
              <div className="lbl">{p.label}</div>
              <div className="sub" style={{ color: 'var(--ip-ink-2)' }}>{p.sub}</div>
              {p.ribbon && <div className="ribbon">{p.ribbon}</div>}

                <div style={{ position: 'absolute', top: 8, right: 10, display: 'inline-flex', alignItems: 'center', gap: 4, background: 'var(--ip-ink)', color: '#fff', padding: '3px 8px', borderRadius: 999, fontSize: 10, fontFamily: 'var(--font-mono)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
                  <Icon.check size={10}/> Choisi
                </div>
              )}
            </button>
          ))}
        </div>
      </div>

      {/* Sections */}
      {sections.map((sec, secIdx) => {
        const isClosed = !!collapsed[sec.id];
        return (
        <div key={sec.id} className="card" style={{ marginBottom: 16, overflow: 'hidden' }}>
          <div style={{ padding: '16px 18px 16px 10px', display: 'flex', alignItems: 'center', gap: 10, borderBottom: isClosed ? 'none' : '1px solid var(--ip-line-2)' }}>

              className="btn-icon"
              onClick={() => toggleCollapse(sec.id)}
              title={isClosed ? 'Déplier' : 'Replier'}

                border: 'none', background: 'transparent',

              <input
                className="txt-input"

              />
            ) : (
              <h3
                onClick={() => toggleCollapse(sec.id)}

              >{sec.title}</h3>

            <span className="pill">{sec.rows.length} ligne{sec.rows.length>1?'s':''}</span>
            {isClosed && (
              <span className="pill" style={{ background: 'var(--ip-orange-soft)', color: '#7c5300' }}>replié</span>
            )}
            <button className="btn-icon danger" title="Supprimer la section" onClick={() => removeSection(secIdx)}>
              <Icon.trash />
            </button>
          </div>

          {!isClosed && <table className="stable">
            <thead>
              <tr>
                <th style={{ width: '38%' }}>Prestation</th>
                {PLAN_DEFS.map(p => <th key={p.key} style={{ width: '18%' }}>{p.label}</th>)}
                <th style={{ width: 40 }}></th>
              </tr>
            </thead>
            <tbody>
              {sec.rows.map((row, rowIdx) => (
                <tr key={rowIdx}>
                  <td>
                    <input
                      className="txt-input"
                      value={row.label}
                      placeholder="Nom de la prestation…"
                      onChange={(e) => updateRowLabel(secIdx, rowIdx, e.target.value)}
                      style={{ border: 'none', background: 'transparent', padding: '4px 6px', fontWeight: 500 }}
                    />
                  </td>
                  {PLAN_DEFS.map((p, pi) => (
                    <td key={p.key}>
                      <SmartSelect
                        value={row.v[pi]}
                        onChange={(val) => updateRowValue(secIdx, rowIdx, pi, val)}
                        options={sec.options}
                        extraClass={p.colCls}
                      />
                    </td>
                  ))}
                  <td>
                    <button className="btn-icon danger" title="Supprimer la ligne" onClick={() => removeRow(secIdx, rowIdx)}>
                      <Icon.trash />
                    </button>
                  </td>
                </tr>
              ))}
              <tr>
                <td colSpan={5} style={{ padding: '10px 14px', borderBottom: 'none' }}>
                  <button className="btn btn-ghost" onClick={() => addRow(secIdx)} style={{ padding: '7px 12px', fontSize: 12.5 }}>
                    <Icon.plus size={12} /> Ajouter une ligne
                  </button>
                </td>
              </tr>
            </tbody>
          </table>}
        </div>
        );
      })}

      {/* Prices row */}
      <div className="card" style={{ marginTop: 20, marginBottom: 20, overflow: 'hidden' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'minmax(240px, 1.6fr) repeat(3, 1fr)' }}>
          <div style={{ padding: '18px 24px', background: 'var(--ip-ink)', color: '#fff', display: 'flex', alignItems: 'center', gap: 12 }}>

function BeforeAfter({ before, after, caption }) {
  const [pos, setPos] = React.useState(50);
  const ref = React.useRef(null);
  const dragging = React.useRef(false);

  const move = (clientX) => {
    const rect = ref.current.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width, clientX - rect.left));
    setPos((x / rect.width) * 100);
  };

  return (
    <div
      ref={ref}
      className="ba-wrap"
      onMouseDown={(e) => { dragging.current = true; move(e.clientX); }}
      onMouseMove={(e) => dragging.current && move(e.clientX)}
      onMouseUp={() => dragging.current = false}
      onMouseLeave={() => dragging.current = false}
      onTouchStart={(e) => move(e.touches[0].clientX)}

  const [playing, setPlaying] = React.useState(false);
  const [muted, setMuted] = React.useState(false);

  React.useEffect(() => {
    timerRef.current = setTimeout(() => {
      const v = videoRef.current;
      if (!v) return;
      v.volume = 0.35;
      v.play().then(() => setPlaying(true)).catch(() => {});
    }, 3000);
    return () => {
      clearTimeout(timerRef.current);
      if (videoRef.current) videoRef.current.pause();
    };
  }, []);

  const togglePlay = () => {
    const v = videoRef.current;
    if (!v) return;
    if (v.paused) { v.play(); setPlaying(true); } else { v.pause(); setPlaying(false); }
  };

  const toggleMute = () => {
    const v = videoRef.current;
    if (!v) return;
    v.muted = !v.muted;
    setMuted(v.muted);
  };

                      {it.missing ? 'Document à fournir' : (it.kind === 'image' ? 'PNG' : 'PDF')}

                  {!it.missing && <Icon.external />}

              ))}
            </div>

  };

  const openPdfWindow = () => {
    const w = window.open('', '_blank');
    if (!w) { pushToast('Débloquer les pop-ups pour générer le PDF'); return; }
    w.document.open();
    w.document.write(buildPrintableHtml());

  };

  const handleSend = (e) => {
    e.preventDefault();
    if (!form.email) { pushToast('Veuillez saisir un courriel'); return; }
    // Open the PDF in a new window, then open the user's mail client with subject/body.

    setTimeout(() => {
      const subject = encodeURIComponent(`Soumission iPropre — ${form.company || form.clientName || 'votre entreprise'}`);

  const handleMailto = () => {
    const subject = encodeURIComponent(`Soumission iPropre — ${form.company || form.clientName || 'votre entreprise'}`);
    const body = encodeURIComponent(`${form.message}\n\n— Plan sélectionné : ${plan.label}\n— Prix : ${price || '—'} $/mois + tx`);

  if (sent) {

          <div style={{ display: 'flex', gap: 10, justifyContent: 'center', flexWrap: 'wrap' }}>
            <button className="btn btn-orange" onClick={openPdfWindow}>

  }

  return (

        <div>
          <span className="eyebrow">05 — Envoi</span>
          <h1>Envoyer la soumission.</h1>
          <p className="sub">Saisissez les coordonnées du client. Un PDF est généré avec tout le détail et votre application courriel s'ouvre pré-remplie.</p>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1fr) 340px', gap: 20 }}>
        {/* Form */}
        <form className="card card-pad" onSubmit={handleSend}>
          <div style={{ fontFamily: 'var(--font-serif)', fontSize: 22, fontWeight: 700, marginBottom: 4 }}>Coordonnées du client</div>

            <Field label="Courriel *" value={form.email} onChange={v => setForm(f => ({...f, email: v}))} type="email" placeholder="client@exemple.com" required />
            <Field label="Téléphone" value={form.phone} onChange={v => setForm(f => ({...f, phone: v}))} placeholder="(514) 000-0000" />

            <Field label="Adresse du service" value={form.address} onChange={v => setForm(f => ({...f, address: v}))} placeholder="3095 Jean-Noël-Lavoie, Laval" />
          </div>

          <div style={{ marginTop: 14 }}>
            <label style={{ display: 'block', fontSize: 12, fontFamily: 'var(--font-mono)', letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ip-muted)', marginBottom: 6 }}>
              Message d'accompagnement
            </label>
            <textarea
              className="txt-input"
              value={form.message}
              onChange={(e) => setForm(f => ({ ...f, message: e.target.value }))}
              rows={6}
              style={{ resize: 'vertical', fontFamily: 'var(--font-sans)' }}

          </div>

          <div style={{ display: 'flex', gap: 10, marginTop: 20, flexWrap: 'wrap' }}>
            <button type="submit" className="btn btn-orange">
              <Icon.mail /> Générer PDF &amp; ouvrir courriel
            </button>
            <button type="button" className="btn btn-ghost" onClick={openPdfWindow}>
              <Icon.download /> Télécharger PDF seulement
            </button>
            <button type="button" className="btn btn-ghost" onClick={handleMailto}>
              <Icon.external /> Ouvrir courriel seulement
            </button>
          </div>

          <div style={{ marginTop: 18, padding: '12px 14px', background: '#fffbf0', borderRadius: 8, border: '1px solid #f5d886', fontSize: 12.5, color: '#6b4a0a', lineHeight: 1.55 }}>
            <strong>À propos de l'envoi :</strong> l'envoi automatique de courriel nécessite un serveur côté iPropre (non disponible dans ce prototype). Le bouton ouvre donc votre application courriel (Outlook, Gmail, Apple Mail…) pré-remplie ; vous joignez simplement le PDF téléchargé avant d'envoyer.

        {/* Summary */}
        <aside className="card" style={{ overflow: 'hidden', alignSelf: 'start', position: 'sticky', top: 100 }}>
          <div className={`plan-head ${plan.headCls}`} style={{ padding: '20px 18px', textAlign: 'center' }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--ip-ink-2)', marginBottom: 4 }}>Plan sélectionné</div>
            <div style={{ fontFamily: 'var(--font-serif)', fontSize: 22, fontWeight: 700 }}>{plan.label}</div>
          </div>
          <div style={{ padding: '18px 20px' }}>

              <span style={{ fontSize: 13, color: 'var(--ip-muted)' }}>Prix mensuel</span>
              <span style={{ fontFamily: 'var(--font-serif)', fontSize: 26, fontWeight: 700 }}>{price || '—'} $</span>

}

function Field({ label, value, onChange, type='text', placeholder, required }) {
  return (
    <label style={{ display: 'block' }}>
      <div style={{ fontSize: 12, fontFamily: 'var(--font-mono)', letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--ip-muted)', marginBottom: 6 }}>{label}</div>

        type={type}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        required={required}
      />
    </label>
  );
}

Object.assign(window, { EnvoiPage });

<script type="text/babel">
// App shell — tabs, state, tweaks

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "signature",
  "density": "comfortable",
  "serifTitles": true,
  "showRibbon": true
}/*EDITMODE-END*/;

const THEMES = {
  signature: { '--ip-orange': '#F4A51C', '--ip-blue': '#8C9BD4', '--ip-coral': '#F5A880' },
  midnight:  { '--ip-orange': '#E8A838', '--ip-blue': '#6B7FB8', '--ip-coral': '#D68A6B' },
  forest:    { '--ip-orange': '#6A9E5A', '--ip-blue': '#7DA8B0', '--ip-coral': '#C89B6A' },
  mono:      { '--ip-orange': '#2a2a30', '--ip-blue': '#7B7B82', '--ip-coral': '#c8c8cc' },
};

function App() {
  const [tab, setTab] = React.useState('presentation');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [toastFn, toastUI] = useToasts();

  const initialState = {
    sections: JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),
    prices: ['', '', ''],
    selectedPlan: 1,
  };
  const [state, setStateRaw] = React.useState(initialState);
  const [history, setHistory] = React.useState([]);
  const [future, setFuture] = React.useState([]);

  const setState = React.useCallback((updater) => {
    setStateRaw(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      setHistory(h => {
        const snap = JSON.stringify(prev);
        const last = h[h.length - 1];
        if (last === snap) return h;
        const nh = [...h, snap];
        return nh.length > 50 ? nh.slice(nh.length - 50) : nh;
      });
      setFuture([]);
      return next;
    });
  }, []);

  const undo = React.useCallback(() => {
    setHistory(h => {
      if (h.length === 0) return h;
      const snap = h[h.length - 1];
      setStateRaw(curr => {
        setFuture(f => [...f, JSON.stringify(curr)]);
        try { return JSON.parse(snap); } catch(e) { return curr; }
      });
      toastFn('Action annulée');
      return h.slice(0, -1);
    });
  }, [toastFn]);

  const redo = React.useCallback(() => {
    setFuture(f => {
      if (f.length === 0) return f;
      const snap = f[f.length - 1];
      setStateRaw(curr => {
        setHistory(h => [...h, JSON.stringify(curr)]);
        try { return JSON.parse(snap); } catch(e) { return curr; }
      });
      toastFn('Action rétablie');
      return f.slice(0, -1);
    });
  }, [toastFn]);

  // Apply theme
  React.useEffect(() => {
    const t = THEMES[tweaks.theme] || THEMES.signature;
    for (const [k, v] of Object.entries(t)) document.documentElement.style.setProperty(k, v);
  }, [tweaks.theme]);

  const tabs = [
    { id: 'presentation', label: 'Présentation' },
    { id: 'soumission', label: 'Soumission', dot: true },
    { id: 'galerie', label: 'Réalisations' },
    { id: 'annexes', label: 'Annexes' },
    { id: 'envoi', label: 'Envoi' },
  ];

  const totalLines = state.sections.reduce((a, s) => a + s.rows.length, 0);
  const plan = PLAN_DEFS[state.selectedPlan];
  const price = state.prices[state.selectedPlan];

  return (
    <React.Fragment>
      {/* Top bar */}
      <header className="topbar">
        <div className="topbar-inner">
          <div className="brand">
            <BrandMark size={40} />
            <div>
              <div className="name">i<em>Propre</em></div>
              <div className="tag">Soumission interactive</div>
            </div>
          </div>
          <nav className="nav-tabs">
            {tabs.map(t => (
              <button
                key={t.id}
                className={tab === t.id ? 'active' : ''}
                onClick={() => setTab(t.id)}
              >
                {t.dot && tab !== t.id && <span className="dot" />}
                {t.label}
              </button>
            ))}
          </nav>
          <div className="client-badge">
            <div className="avatar">IP</div>
            <div className="meta">
              <div className="n">Idriss Sassi</div>
              <div className="d">Président · Laval, QC</div>
            </div>
          </div>
        </div>
      </header>

      <main>
        {tab === 'presentation' && <PresentationPage />}
        {tab === 'soumission' && <SoumissionPage state={state} setState={setState} pushToast={toastFn} history={history} undo={undo} future={future} redo={redo} />}
        {tab === 'galerie' && <GaleriePage />}
        {tab === 'annexes' && <AnnexesPage />}
        {tab === 'envoi' && <EnvoiPage state={state} pushToast={toastFn} />}

        {/* Sticky action bar (always visible) */}
        <div className="actionbar">
          <div className="total-box">
            <div>
              <div className="k">Plan</div>
              <div className="v">{plan.label}</div>
            </div>
          </div>
          <div className="total-box">
            <div>
              <div className="k">Prix / mois</div>
              <div className="v">{price || '—'} $</div>
            </div>
          </div>
          <div className="total-box" style={{ borderRight: 'none' }}>
            <div>
              <div className="k">Lignes</div>
              <div className="v" style={{ fontSize: 18 }}>{totalLines}</div>
            </div>
          </div>
          <div className="spacer" />
          {tab !== 'soumission' && (
            <button className="btn btn-light" onClick={() => setTab('soumission')}>
              <Icon.edit /> Modifier le devis
            </button>
          )}
          {tab !== 'envoi' && (
            <button className="btn btn-orange" onClick={() => setTab('envoi')}>
              <Icon.mail /> Envoyer au client <Icon.arrow />
            </button>
          )}
        </div>
      </main>

      {toastUI}

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection label="Thème de couleur" />
        <TweakRadio
          label="Palette"
          value={tweaks.theme}
          onChange={(v) => setTweak('theme', v)}
          options={['signature', 'midnight', 'forest', 'mono']}
        />
        <TweakSection label="Affichage" />
        <TweakToggle
          label="Titres en serif"
          value={tweaks.serifTitles}
          onChange={(v) => setTweak('serifTitles', v)}
        />
        <TweakToggle
          label="Bannière 'Recommandé'"
          value={tweaks.showRibbon}
          onChange={(v) => setTweak('showRibbon', v)}
        />
      </TweaksPanel>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app-root'));
root.render(<App />);

</script>

</body>
